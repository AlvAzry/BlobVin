<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlobTracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f11;
    color: #f0f0f2;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #2a2a30;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  header h1 span { color: #4f8ef7; }
  .badge {
    background: #1a2d55;
    color: #4f8ef7;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .subtitle {
    color: #80808a;
    font-size: 12px;
    margin-left: auto;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 49px);
  }

  .video-wrap {
    position: relative;
    background: #000;
    flex: 1;
    min-height: 0;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  canvas#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .blob-badge {
    position: absolute;
    top: 10px;
    left: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #2a2a30;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 13px;
    font-weight: 600;
    color: #00ff88;
    backdrop-filter: blur(4px);
  }

  .rec-badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: rgba(255,69,58,0.85);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    display: none;
    align-items: center;
    gap: 6px;
  }
  .rec-badge.active { display: flex; }
  .rec-dot {
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0; }
  }

  .controls {
    background: #131316;
    border-top: 1px solid #2a2a30;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    max-height: 44vh;
  }

  .btn-row {
    display: flex;
    gap: 8px;
  }
  button {
    flex: 1;
    padding: 10px 8px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: inherit;
  }
  button:active { opacity: 0.75; }

  .btn-cam-front {
    background: #1e1e24;
    color: #c0c0cc;
    border: 1px solid #35353f;
  }
  .btn-cam-front.active {
    background: #1a2d55;
    color: #4f8ef7;
    border-color: #4f8ef7;
  }
  .btn-cam-back {
    background: #1e1e24;
    color: #c0c0cc;
    border: 1px solid #35353f;
  }
  .btn-cam-back.active {
    background: #1a2d55;
    color: #4f8ef7;
    border-color: #4f8ef7;
  }
  .btn-record {
    background: #0d2e14;
    color: #2dce6e;
    border: 1px solid #2dce6e;
  }
  .btn-record.recording {
    background: #3d1210;
    color: #ff453a;
    border-color: #ff453a;
  }
  .btn-save {
    background: #1e1e24;
    color: #80808a;
    border: 1px solid #35353f;
  }
  .btn-save.ready {
    background: #0d2040;
    color: #4f8ef7;
    border-color: #4f8ef7;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.4px;
    color: #80808a;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .slider-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-label {
    font-size: 12px;
    color: #c0c0cc;
    width: 130px;
    flex-shrink: 0;
  }
  input[type=range] {
    flex: 1;
    height: 4px;
    accent-color: #4f8ef7;
    cursor: pointer;
  }
  .slider-val {
    font-size: 12px;
    font-weight: 700;
    color: #4f8ef7;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Hull+Web active indicator */
  .hull-status {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a0a00;
    border: 1px solid #ff8844;
    border-radius: 8px;
    font-size: 12px;
    color: #ff8844;
    font-weight: 600;
  }
  .hull-dot {
    width: 8px; height: 8px;
    background: #ff8844;
    border-radius: 50%;
  }

  /* Save instructions toast */
  #save-toast {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1f;
    border: 1px solid #4f8ef7;
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    color: #f0f0f2;
    text-align: center;
    z-index: 999;
    max-width: 90vw;
    line-height: 1.6;
  }
  #save-toast.show { display: block; }
</style>
</head>
<body>

<header>
  <h1>BLOB<span>TRACKER</span></h1>
  <span class="badge">v2.0</span>
  <span class="subtitle" id="fps-label">— fps</span>
</header>

<div class="app">

  <div class="video-wrap">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="blob-badge" id="blob-badge">0 blobs</div>
    <div class="rec-badge" id="rec-badge">
      <div class="rec-dot"></div> REC
    </div>
  </div>

  <div class="controls">

    <div class="btn-row">
      <button class="btn-cam-front active" id="btn-front"
              onclick="switchCamera('user')">
        📷 Front
      </button>
      <button class="btn-cam-back" id="btn-back"
              onclick="switchCamera('environment')">
        🔭 Back
      </button>
      <button class="btn-record" id="btn-record"
              onclick="toggleRecord()">
        ⏺ Record
      </button>
      <button class="btn-save" id="btn-save"
              onclick="saveRecording()">
        ⬇ Save
      </button>
    </div>

    <div>
      <div class="section-title">Detection</div>
      <div class="slider-row">
        <div class="slider-item">
          <span class="slider-label">Sensitivity</span>
          <input type="range" id="sl-sensitivity"
                 min="1" max="50" value="15"
                 oninput="updateVal('sensitivity',this.value)">
          <span class="slider-val" id="val-sensitivity">15</span>
        </div>
        <div class="slider-item">
          <span class="slider-label">Min Blob (px²)</span>
          <input type="range" id="sl-minsize"
                 min="0" max="3000" value="200" step="50"
                 oninput="updateVal('minsize',this.value)">
          <span class="slider-val" id="val-minsize">200</span>
        </div>
        <div class="slider-item">
          <span class="slider-label">Max Blob (px²)</span>
          <input type="range" id="sl-maxsize"
                 min="500" max="30000" value="15000" step="500"
                 oninput="updateVal('maxsize',this.value)">
          <span class="slider-val" id="val-maxsize">15000</span>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">Overlay Aktif</div>
      <div class="hull-status">
        <div class="hull-dot"></div>
        🔶 Hull + Web — Convex Hull &amp; Centroid Web
      </div>
    </div>

  </div>
</div>

<!-- Save toast instructions -->
<div id="save-toast">
  <strong>Tap the share icon below<br>then "Save to Photos"</strong><br>
  <span style="color:#80808a;font-size:11px">
    iOS saves the video to your Photo Gallery
  </span><br>
  <button onclick="dismissToast()"
          style="margin-top:8px;flex:unset;padding:6px 18px;
                 background:#4f8ef7;color:#fff;border:none;
                 border-radius:8px;font-size:13px;font-weight:600">
    OK
  </button>
</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let facingMode   = 'user';
let stream       = null;
let animFrame    = null;
let prevFrame    = null;   // Uint8Array grayscale only — 4× lebih ringan
let blobTrails   = {};
let nextId       = 0;
let recording    = false;
let mediaRec     = null;
let recChunks    = [];
let recBlob      = null;
let lastTime     = performance.now();
let frameCount   = 0;
let fps          = 0;

// ── SCALE DOWN resolusi processing ──────────
// Video tetap 1280×720 untuk tampilan, tapi
// motion detection diproses di 320×180 (1/4)
// Ini PALING signifikan mengurangi beban CPU
const PROC_SCALE = 0.25;

const sliders = {
  sensitivity:15, minsize:200, maxsize:15000,
};

// ─────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────
const vid = document.getElementById('vid');
const cvs = document.getElementById('overlay');
// alpha:false + willReadFrequently:false — canvas ini WRITE ONLY untuk recording
const ctx = cvs.getContext('2d', { alpha: false });

async function startCamera(facing) {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: facing },
        width:  { ideal: 1280 },
        height: { ideal: 720 },
      },
      audio: false,
    });
    vid.srcObject = stream;
    await vid.play();
    facingMode   = facing;
    prevFrame    = null;
    blobTrails   = {};
    document.getElementById('btn-front')
      .classList.toggle('active', facing==='user');
    document.getElementById('btn-back')
      .classList.toggle('active', facing==='environment');
  } catch(e) {
    alert('Camera error: ' + e.message);
  }
}

function switchCamera(facing) { startCamera(facing); }

// ─────────────────────────────────────────────
// RECORDING
// ─────────────────────────────────────────────
function getBestMimeType() {
  const types = [
    'video/mp4',
    'video/mp4;codecs=avc1',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

function toggleRecord() {
  if (!recording) startRecording();
  else            stopRecording();
}

function startRecording() {
  recChunks = [];
  recBlob   = null;
  const savBtn = document.getElementById('btn-save');
  savBtn.classList.remove('ready');
  savBtn.textContent = '⬇ Save';
  const mimeType = getBestMimeType();
  const opts     = mimeType ? { mimeType } : {};
  try {
    mediaRec = new MediaRecorder(cvs.captureStream(30), opts);
  } catch(e) {
    alert('Recording not supported: ' + e.message);
    return;
  }
  mediaRec.ondataavailable = e => {
    if (e.data && e.data.size > 0) recChunks.push(e.data);
  };
  mediaRec.onstop = () => {
    const mime = mimeType || 'video/webm';
    recBlob    = new Blob(recChunks, { type: mime });
    const btn  = document.getElementById('btn-save');
    btn.classList.add('ready');
    btn.textContent = '⬇ Save';
  };
  mediaRec.start(100);
  recording = true;
  document.getElementById('btn-record').classList.add('recording');
  document.getElementById('btn-record').textContent = '⏹ Stop';
  document.getElementById('rec-badge').classList.add('active');
}

function stopRecording() {
  if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
  recording = false;
  document.getElementById('btn-record').classList.remove('recording');
  document.getElementById('btn-record').textContent = '⏺ Record';
  document.getElementById('rec-badge').classList.remove('active');
}

async function saveRecording() {
  if (!recBlob) {
    alert('No recording yet — press Record first, then Stop, then Save.');
    return;
  }
  const isMP4 = recBlob.type.includes('mp4');
  const ext   = isMP4 ? 'mp4' : 'webm';
  const fname = 'blobtracker-' +
    new Date().toISOString().slice(0,19).replace(/:/g,'-') + '.' + ext;
  const file = new File([recBlob], fname, { type: recBlob.type });
  if (navigator.canShare && navigator.canShare({ files:[file] })) {
    try {
      await navigator.share({ files: [file], title: 'BlobTracker Recording' });
      return;
    } catch(e) {
      if (e.name === 'AbortError') return;
    }
  }
  const url = URL.createObjectURL(recBlob);
  const a   = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS) showToast();
}

function showToast()    { document.getElementById('save-toast').classList.add('show'); }
function dismissToast() { document.getElementById('save-toast').classList.remove('show'); }

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function updateVal(key, val) {
  sliders[key] = parseFloat(val);
  document.getElementById('val-'+key).textContent = val;
}

// ─────────────────────────────────────────────
// BLOB MATCHING
// ─────────────────────────────────────────────
function matchBlobs(prevTrails, newCentroids) {
  const updated = {};
  const used    = new Set();
  for (const [cx,cy] of newCentroids) {
    let bestId=null, bestDist=80;
    for (const [tid,trail] of Object.entries(prevTrails)) {
      if (used.has(tid)||!trail.length) continue;
      const last = trail[trail.length-1];
      const d    = Math.hypot(cx-last.x, cy-last.y);
      if (d < bestDist) { bestDist=d; bestId=tid; }
    }
    if (bestId!==null) {
      used.add(bestId);
      const t = prevTrails[bestId];
      t.push({x:cx,y:cy});
      if (t.length>60) t.shift(); // kurangi trail length — tidak dirender juga
      updated[bestId] = t;
    } else {
      updated[nextId] = [{x:cx,y:cy}];
      nextId++;
    }
  }
  return updated;
}

// ─────────────────────────────────────────────
// OFFSCREEN CANVAS — hanya untuk processing,
// ukurannya diperkecil PROC_SCALE
// ─────────────────────────────────────────────
const offCvs = document.createElement('canvas');
const offCtx = offCvs.getContext('2d', { willReadFrequently: true });

// ─────────────────────────────────────────────
// MOTION MASK — bekerja di resolusi kecil
// Hanya baca channel R saja (3× lebih cepat)
// ─────────────────────────────────────────────
function getMotionMask(curr, prev, w, h, thresh) {
  const mask = new Uint8Array(w * h);
  const len  = w * h;
  for (let i = 0; i < len; i++) {
    const p  = i * 4;
    // Approx luma tanpa float multiply — pakai shift
    const lc = (curr[p]*2 + curr[p+1]*5 + curr[p+2]) >> 3;
    const lp = (prev[p]*2 + prev[p+1]*5 + prev[p+2]) >> 3;
    if ((lc - lp > thresh) || (lp - lc > thresh)) mask[i] = 255;
  }
  return mask;
}

// ── Dilate pakai radius 2 (bukan 4) di resolusi kecil
// Efek visual setara resolusi penuh dengan radius 8
function dilateMask(mask, w, h, r) {
  const out = new Uint8Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (!mask[y*w+x]) continue; // skip kalau bukan motion
      // Isi lingkaran sekitar pixel ini
      const x0=Math.max(0,x-r), x1=Math.min(w-1,x+r);
      const y0=Math.max(0,y-r), y1=Math.min(h-1,y+r);
      for (let dy=y0; dy<=y1; dy++) {
        for (let dx=x0; dx<=x1; dx++) {
          out[dy*w+dx] = 255;
        }
      }
    }
  }
  return out;
}

// ─────────────────────────────────────────────
// FIND BLOBS — pakai index pointer, bukan shift()
// ─────────────────────────────────────────────
function findBlobs(mask, w, h, minArea, maxArea) {
  const visited = new Uint8Array(w * h);
  const blobs   = [];
  const queue   = new Int32Array(w * h); // pre-alloc, hindari GC

  for (let sy = 0; sy < h; sy++) {
    for (let sx = 0; sx < w; sx++) {
      const si = sy*w+sx;
      if (mask[si] !== 255 || visited[si]) continue;
      // BFS dengan pointer — O(n) murni
      let head=0, tail=0;
      queue[tail++] = si;
      visited[si] = 1;
      let minX=sx, maxX=sx, minY=sy, maxY=sy, pixels=0;
      while (head < tail) {
        const idx = queue[head++];
        const qx  = idx % w;
        const qy  = (idx - qx) / w;
        pixels++;
        if (qx < minX) minX=qx; if (qx > maxX) maxX=qx;
        if (qy < minY) minY=qy; if (qy > maxY) maxY=qy;
        const nbrs = [idx-1, idx+1, idx-w, idx+w];
        for (let k=0; k<4; k++) {
          const n = nbrs[k];
          if (n>=0 && n<w*h && !visited[n] && mask[n]===255) {
            visited[n]=1; queue[tail++]=n;
          }
        }
      }
      if (pixels < minArea || pixels > maxArea) continue;
      const bw = maxX-minX+1, bh = maxY-minY+1;
      blobs.push({
        x:minX, y:minY, w:bw, h:bh,
        cx:Math.round(minX+bw/2),
        cy:Math.round(minY+bh/2),
        area:pixels,
      });
    }
  }
  return blobs;
}

// ─────────────────────────────────────────────
// HULL + WEB OVERLAY
// ─────────────────────────────────────────────
function drawHullWeb(c, blobs) {
  if (blobs.length < 2) return;
  const gcx = blobs.reduce((s,b)=>s+b.cx,0) / blobs.length;
  const gcy = blobs.reduce((s,b)=>s+b.cy,0) / blobs.length;
  c.strokeStyle='#ff8844'; c.fillStyle='#ff8844'; c.lineWidth=1.5;
  for (const b of blobs) {
    c.beginPath(); c.moveTo(b.cx,b.cy); c.lineTo(gcx,gcy); c.stroke();
  }
  c.beginPath(); c.arc(gcx,gcy,5,0,Math.PI*2); c.fill();
  c.font = '11px -apple-system,sans-serif';
  c.fillText('G', gcx+7, gcy+4);
  if (blobs.length >= 3) {
    const pts  = blobs.map(b=>[b.cx,b.cy]);
    const hull = convexHull(pts);
    if (hull.length >= 3) {
      c.beginPath(); c.moveTo(hull[0][0],hull[0][1]);
      for (let i=1; i<hull.length; i++) c.lineTo(hull[i][0],hull[i][1]);
      c.closePath(); c.stroke();
    }
  }
}

function convexHull(pts) {
  if (pts.length < 3) return pts;
  pts = pts.slice().sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  const lower = [];
  for (const p of pts) {
    while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i=pts.length-1; i>=0; i--) {
    const p=pts[i];
    while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0) upper.pop();
    upper.push(p);
  }
  return lower.slice(0,-1).concat(upper.slice(0,-1));
}
function cross(O,A,B) {
  return (A[0]-O[0])*(B[1]-O[1])-(A[1]-O[1])*(B[0]-O[0]);
}

// ─────────────────────────────────────────────
// CONTRAST COLOR (fast path)
// ─────────────────────────────────────────────
function contrastColor(imgData, x, y, bw, bh, W, H) {
  let sum=0, count=0;
  // Sample hanya 10×4 pixel — bukan seluruh area blob
  const x1=Math.max(0,x), x2=Math.min(W,x+bw);
  const y1=Math.max(0,y-10), y2=Math.min(H,y+4);
  const stepX = Math.max(1, Math.floor((x2-x1)/10));
  const stepY = Math.max(1, Math.floor((y2-y1)/2));
  for (let iy=y1; iy<y2; iy+=stepY) {
    for (let ix=x1; ix<x2; ix+=stepX) {
      const p=(iy*W+ix)*4;
      sum += (imgData[p]*2 + imgData[p+1]*5 + imgData[p+2]) >> 3;
      count++;
    }
  }
  return (!count||(sum/count)<128) ? '#00f5ff' : '#3c14dc';
}

// ─────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────
// Throttle: proses detection hanya tiap N frame
// Render overlay tetap setiap frame
let procTick    = 0;
const PROC_EVERY = 2; // proses motion tiap 2 frame = 15fps detection
let lastBlobs   = [];
let lastImgData = null;

function loop() {
  animFrame = requestAnimationFrame(loop);
  if (!vid.videoWidth || vid.readyState < 2) return;

  const VW = vid.videoWidth, VH = vid.videoHeight;

  // Canvas HARUS sama persis dengan resolusi video agar
  // recording menangkap frame video + tracking (bukan hitam)
  if (cvs.width !== VW || cvs.height !== VH) {
    cvs.width  = VW;
    cvs.height = VH;
  }
  const dw = VW, dh = VH;

  // Processing canvas = versi kecil
  const PW = Math.round(VW * PROC_SCALE);
  const PH = Math.round(VH * PROC_SCALE);
  if (offCvs.width !== PW || offCvs.height !== PH) {
    offCvs.width  = PW;
    offCvs.height = PH;
  }

  // ── FPS counter ──
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fps = frameCount; frameCount = 0; lastTime = now;
    document.getElementById('fps-label').textContent = fps + ' fps';
  }

  // ── Motion detection — hanya tiap PROC_EVERY frame ──
  procTick++;
  if (procTick >= PROC_EVERY) {
    procTick = 0;

    // Gambar video ke offscreen canvas kecil
    offCtx.drawImage(vid, 0, 0, PW, PH);
    const currData = offCtx.getImageData(0, 0, PW, PH);

    if (prevFrame) {
      const thresh = Math.max(1, 60 - sliders.sensitivity);
      let mask = getMotionMask(currData.data, prevFrame, PW, PH, thresh);
      mask = dilateMask(mask, PW, PH, 2);

      // minsize/maxsize di-scale ke koordinat kecil
      const scaleArea = PROC_SCALE * PROC_SCALE;
      const rawBlobs  = findBlobs(
        mask, PW, PH,
        sliders.minsize * scaleArea,
        sliders.maxsize * scaleArea
      );

      // Scale balik koordinat ke resolusi VIDEO (bukan display)
      const invS = 1 / PROC_SCALE;
      lastBlobs = rawBlobs.map(b => ({
        x:  Math.round(b.x  * invS),
        y:  Math.round(b.y  * invS),
        w:  Math.round(b.w  * invS),
        h:  Math.round(b.h  * invS),
        cx: Math.round(b.cx * invS),
        cy: Math.round(b.cy * invS),
        area: b.area,
      }));

      blobTrails = matchBlobs(blobTrails, lastBlobs.map(b=>[b.cx,b.cy]));

      // Update prevFrame — hanya simpan data grayscale (Uint8Array)
      // bukan ImageData penuh. Ini 1/4 dari memori sebelumnya.
      if (!prevFrame || prevFrame.length !== currData.data.length) {
        prevFrame = new Uint8Array(currData.data.length);
      }
      // Decay 70/30
      for (let i=0; i<currData.data.length; i++) {
        prevFrame[i] = (prevFrame[i] * 0.7 + currData.data[i] * 0.3) | 0;
      }

      lastImgData = currData.data;
    } else {
      // Init prevFrame
      prevFrame = new Uint8Array(currData.data);
    }

    document.getElementById('blob-badge').textContent =
      lastBlobs.length + (lastBlobs.length===1 ? ' blob' : ' blobs');
  }

  // ── RENDER — setiap frame ──
  // Render video ke canvas DULU — ini yang membuat recording tidak hitam
  // sekaligus menggantikan clearRect (video menutupi frame sebelumnya)
  ctx.drawImage(vid, 0, 0, VW, VH);

  // Hull+Web overlay
  if (lastBlobs.length >= 2) drawHullWeb(ctx, lastBlobs);

  // Bounding boxes
  const overlayImgData = lastImgData;
  for (let i=0; i<lastBlobs.length; i++) {
    const b = lastBlobs[i];

    // Overlap check
    let isOv = false;
    for (let j=0; j<lastBlobs.length; j++) {
      if (j===i) continue;
      const o = lastBlobs[j];
      if (b.x<o.x+o.w && b.x+b.w>o.x && b.y<o.y+o.h && b.y+b.h>o.y) {
        isOv = true; break;
      }
    }

    const color = isOv ? '#ff453a' : '#00f5ff';

    ctx.strokeStyle = color; ctx.lineWidth = 1;
    ctx.strokeRect(b.x, b.y, b.w, b.h);

    // Corner ticks
    ctx.lineWidth = 2;
    const t = 10;
    const corners = [[b.x,b.y,1,1],[b.x+b.w,b.y,-1,1],
                     [b.x,b.y+b.h,1,-1],[b.x+b.w,b.y+b.h,-1,-1]];
    for (const [cx2,cy2,dx,dy] of corners) {
      ctx.beginPath();
      ctx.moveTo(cx2,cy2); ctx.lineTo(cx2+dx*t,cy2);
      ctx.moveTo(cx2,cy2); ctx.lineTo(cx2,cy2+dy*t);
      ctx.stroke();
    }

    if (isOv) {
      ctx.fillStyle='#ff453a';
      ctx.font='11px -apple-system,sans-serif';
      ctx.fillText('OVERLAP', b.x, b.y-6);
    }

    const lbl = `#${i+1}  ${b.cx},${b.cy}`;
    let lx = b.x + b.w + 8;
    ctx.font = '11px -apple-system,sans-serif';
    const tw = ctx.measureText(lbl).width;
    if (lx + tw > dw) lx = b.x - tw - 8;
    ctx.fillStyle = color;
    ctx.fillText(lbl, lx, b.y+14);
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
startCamera('user').then(() => loop());
</script>
